<aside>
    <nav>
        <ul>
            <li>
                <h4>
                    On this page
                </h4>
            </li>
            @if (sections().length === 0) {
                <li>
                    <p>No sections found.</p>
                </li>
            }
            @else {
                @for (section of sections(); track section.id) {
                    <li>
                        <a [href]="'#' + section.id" [class.active]="isActive(section.id)">{{ section.title }}</a>
                    </li>
                }
            }
        </ul>
    </nav>
</aside>
