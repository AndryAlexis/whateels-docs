<aside>
    <nav>
        <ul class="mobile-menu-header">
            <li>
                <button class="close-button" (click)="leftSidebarService.close()">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </li>
            <li>
                <a href="/">
                    <app-logo [width]="30" [height]="30"></app-logo>
                </a>
            </li>
        </ul>
        <ul>
            @if (loading) {
                <li class="sidebar-loading">
                    <app-section
                        [title]="'Loading categories...'"
                        [items]="[]"
                    ></app-section>
                </li>
            }
            @else if (error) {
                <li class="sidebar-error">
                    <span>{{ error }}</span>
                </li>
            }
            @else if (categories?.length) {
                @for (category of categories; track $index) {
                    <li>
                        <app-section
                            [title]="category.title"
                            [items]="pageItems(category)"
                        ></app-section>
                    </li>
                }
            }
            @else {
                <li>
                    <app-section
                        [title]="'Documentation'"
                        [items]="[]"
                    ></app-section>
                </li>
            }
        </ul>
    </nav>
</aside>
<div class="background" (click)="leftSidebarService.close()"></div>
